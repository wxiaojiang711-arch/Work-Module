# 工作流名称（自定义，随便写）
name: Deploy React to GitHub Pages

# 触发条件：当推送到 main 分支时自动运行
on:
  push:
    branches: [ main ]  # 如果你的分支是 master，改成 master

# 要执行的任务
jobs:
  deploy:
    # 运行在最新的 Ubuntu 系统上
    runs-on: ubuntu-latest

    # 具体步骤
    steps:
      # 1. 拉取仓库代码到虚拟服务器
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js（指定版本，20 是稳定版）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # 缓存 npm 依赖，加速下次构建

      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm install

      # 4. 打包 React 项目（生成 dist 文件夹）
      - name: Build React project
        run: npm run build

      # 5. 部署 dist 文件夹到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # 自动生成的 token，无需手动配置
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 要部署的文件夹（React 打包后的 dist）
          publish_dir: ./dist
          # 部署到 gh-pages 分支（自动创建，不用管）
          publish_branch: gh-pages
